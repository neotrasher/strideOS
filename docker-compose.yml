services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3080:3000"
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    profiles:
      - ops
    command: ["npx", "prisma", "db", "push", "--skip-generate"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: strideos
      POSTGRES_USER: strideos
      POSTGRES_PASSWORD: strideos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strideos -d strideos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
